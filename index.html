<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Cambios de Helados</title>
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.webmanifest">
<style>
:root{--bg:#efedf2;--card:#fff;--fg:#111;--muted:#7d8290;--border:#e8e7ec;--chip:#f5f4f7;--chip-fg:#6f7482;--accent:#2f7b8b;--accent-press:#286b79;--danger:#ff3b30;--danger-soft:#ffe1de;--shadow:0 10px 30px rgba(18,18,23,.05);--radius:22px}
*{box-sizing:border-box}html,body{min-height:100%;margin:0;-webkit-text-size-adjust:100%;touch-action:manipulation}body{background:var(--bg);color:var(--fg);font-family:Inter,-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,Arial,sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}header{position:sticky;top:0;z-index:10;background:rgba(239,237,242,.88);backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid rgba(17,17,17,.05)}.wrap,.main{max-width:760px;margin:auto}.wrap{padding:18px 18px 14px;min-height:20px}.main{padding:18px;display:flex;flex-direction:column;gap:14px}.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}.pad{padding:18px}.row{display:flex;align-items:center;justify-content:space-between;gap:10px}.left{min-width:0}.title{font-weight:800;font-size:18px;letter-spacing:-.03em}.sub,.muted,.label{font-size:12px;color:var(--muted);font-weight:500}.chip{display:inline-flex;align-items:center;justify-content:center;min-width:34px;padding:5px 10px;border-radius:999px;background:var(--chip);color:var(--chip-fg);border:1px solid var(--border);font-size:11px;font-weight:700}input,button{font-size:16px;border-radius:18px;outline:none}input{width:100%;border:2px solid #d9dde5;background:#fff;color:var(--fg);padding:15px 16px;font-weight:600;box-shadow:inset 0 1px 0 rgba(255,255,255,.75)}input::placeholder{color:#b2b7c2;font-weight:500}input:focus{border-color:#bcc5d2;box-shadow:0 0 0 4px rgba(47,123,139,.1)}button{background:#fff;border:1px solid var(--border);padding:11px 14px;font-weight:700;color:var(--fg);box-shadow:0 1px 0 rgba(255,255,255,.8);cursor:pointer}button:active{transform:scale(.985)}.btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-radius:20px;border:2px solid #d9dde5}.list{height:min(52svh,460px);overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;padding:4px 0}.item{padding:14px 16px;border-bottom:1px solid #f0eff4;display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:10px}.item:last-child{border-bottom:0}.truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:56vw}.kpi{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}.k{background:linear-gradient(180deg,#fff 0%,#fcfbfd 100%);border:1px solid var(--border);border-radius:18px;padding:14px}.label{margin-bottom:4px;font-weight:600}.value{font-weight:800;letter-spacing:-.03em;font-size:17px}.full{grid-column:1/-1;background:#000;color:#fff}.full .label{color:#d1d5db}.note{font-size:11px;color:#cfd7de;margin-top:4px}.apply{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:none}.apply:active{background:var(--accent-press)}.danger{border-color:var(--danger-soft);color:var(--danger)}.hidden{display:none!important}.modal{position:fixed;inset:0;z-index:60;background:rgba(17,17,17,.28);padding:18px;display:flex;align-items:flex-end;justify-content:center}.sheet{width:100%;max-width:760px;background:#fff;border:1px solid var(--border);border-radius:26px 26px 0 0;box-shadow:0 -12px 40px rgba(0,0,0,.12);padding:16px 16px 20px}.handle{width:48px;height:5px;border-radius:999px;background:#d7d9df;margin:2px auto 14px}.stack,.mini-row{display:flex;flex-direction:column;gap:10px}.mini-row{flex-direction:row;gap:6px}.divider{height:1px;background:#f0eff4;margin:14px 0}.cart-row{justify-content:space-between;gap:8px;align-items:center;border:1px solid var(--border);border-radius:12px;padding:8px;background:#fff}@media (max-width:640px){.item{grid-template-columns:minmax(0,1fr);align-items:flex-start}.item .row{width:100%;justify-content:flex-end}}
</style>
</head>
<body>
<header><div class="wrap"></div></header>
<main class="main">
<section class="card pad">
<div class="sub">Canal</div>
<button id="btnOpenCanal" class="btn" type="button"><span id="canalActualLabel">Canal Detalle</span><span class="muted" style="font-size:18px">▾</span></button>
</section>

<div id="canalModal" class="modal hidden"><div class="sheet"><div class="handle"></div>
<div class="row" style="margin-bottom:10px"><div><div class="title" style="font-size:18px">Canal y motivo</div><div class="sub">Selecciona ambos dentro de esta misma ventana.</div></div><button id="btnCloseCanal" type="button">Cerrar</button></div>
<div class="stack"><div class="sub">Canal</div><button class="canal-option" data-canal="Canal Detalle" type="button">Canal Detalle</button><button class="canal-option" data-canal="Super 24" type="button">Super 24</button><button class="canal-option" data-canal="Cruz Verde" type="button">Cruz Verde</button></div>
<div class="divider"></div>
<div class="stack"><div class="sub">Motivo del cambio</div><button class="motivo-option" data-motivo="50" type="button">Falta de energía eléctrica (50%)</button><button class="motivo-option" data-motivo="100" type="button">Falla del congelador (100%)</button></div>
</div></div>

<section class="card"><div class="pad" style="padding-bottom:10px"><input id="search" type="text" placeholder="Buscar producto…"></div><div id="list" class="list"></div></section>
<section class="card pad">
<div class="row"><div class="title" style="font-size:14px">Resumen</div><button id="btnClear" type="button">Limpiar</button></div>
<div id="cart" class="stack" style="margin-top:8px"></div>
<div class="kpi"><div class="k"><div class="label">Subtotal</div><div id="subtotal" class="value">Q0.00</div></div><div class="k"><div class="label">Motivo</div><div id="motivoLabel" class="value">Falta de energía eléctrica (50%)</div></div><div class="k full"><div class="label">Monto real a aplicar</div><div id="aplicar" class="value" style="font-size:20px">Q0.00</div><div class="note">Nota: se aplica el <span id="motivoPct">50</span>% sobre el subtotal.</div></div></div>
</section>
</main>
<script>
(()=>{
  let lastTouchEnd=0;
  let canal="Canal Detalle";
  let motivo={key:"50",label:"Falta de energía eléctrica (50%)",factor:.5};

  const $=id=>document.getElementById(id);
  const Q=n=>`Q${(+n||0).toFixed(2)}`;
  const ui={};
  const state={cart:[],query:""};
  const PRECIOS={"Canal Detalle":{},"Super 24":{},"Cruz Verde":{}};
  const MOTIVOS={
    "50":{key:"50",label:"Falta de energía eléctrica (50%)",factor:.5},
    "100":{key:"100",label:"Falla del congelador (100%)",factor:1}
  };
  const base=[
    ["Fresa",4.5],["Guanaba",4.5],["Mora",4.5],["Jocote",4.5],["Mango Verde con Pepitoria",4.5],["Limón Dieta",6.3],["Mandarina Dieta",6.3],
    ["Fresa Dieta",6.3],["Mango Dieta",6.3],["Yogurt de Fresa",6.3],["Yogurt de Melocotón",6.3],["Vainilla",4.5],["Chocolate",4.5],["Limón",4.5],
    ["Mandarina",4.5],["Naranja con Pepitoria",4.5],["Mango",4.5],["Piña con Pepitoria",4.5],["Tamarindo con Tajín",4.5],["Nance",4.5],["Paleta de Nutela",7.5],
    ["Paleta Morena",5.25],["Paleta Chocolate Crispi",4.5],["Paleta Chocolate Cream",3.75],["Paleta de Mantequilla de Maní",7.5],["Chocobanano con Maní Pequeño",5.25],
    ["Chocobanano sin Maní Pequeño",4.5],["Cholapiz",1.87],["Arco Iris",2.25],["Twist Arcoiris",3.75],["Twist Cotton Candy",3.75],["Twist Gum (Chicle)",3.75],
    ["Mixta Barritas",0],["Mixta Piñata",0.75],["Cremosa Mandarina",3],["Cremosa Uva",3],["Cremosa Granadina",3],["Cremosa Frambuesa",3],["Cremosa Arandano",3],
    ["Twist Sipi Manzana Limon",3.75],["Twist Sipi Punch Uva",3.75],["Morena Cookies And Cream",6],["Morena Con Cajeta",6]
  ].map(([name,price])=>({name,price}));

  const productosSuper24=[
["Paleta Arcoiris",2.09],
["Paleta Chocolate Crispy",4.19],
["Paleta Coco",4.19],
["Paleta Cremosa Arandano",2.78],
["Paleta Cremosa Frambuesa",2.78],
["Paleta Cremosa Granadina",2.79],
["Paleta Cremosa Mandarina",2.79],
["Paleta Fresa",4.19],
["Paleta Guanaba",4.19],
["Paleta Jocote",4.19],
["Paleta Limon",4.50],
["Paleta Mango",4.50],
["Paleta Mango Verde Pepitoria",4.19],
["Paleta Mora",4.19],
["Twist Arcoiris",3.48],
["Chocobanano Mixto",26.00],
["Chocobanano Sombrella Sin Mani",4.50],
["Chocobanano Sombrella Con Mani",4.87],
["Chocobanano Sombrella Con Mani Grande",8.40],
["Twis Sipi Manzana Limon",3.48],
["Twis Sipi Punch Uva",3.48],
["Paleta Vainilla",4.50],
["Caja Chapina",22.97],
["Nieve de Fresa Bote",24.25],
["Helado Paleta Arcoiris",2.09],
["Helado Paleta Chocolate Crispy",4.19]
  ];

function normalizarNombre(nombre){
    return String(nombre)
      .toLowerCase()
      .normalize('NFD')
      .split('').filter(ch=>ch<'̀'||ch>'ͯ').join('')
      .split('helado ').join('')
      .split('paleta ').join('')
      .split('sombrella ').join('')
      .split('crispi').join('crispy')
      .split('twis ').join('twist ')
      .split('con mani pequeno').join('con mani')
      .split('sin mani pequeno').join('sin mani')
      .split('  ').join(' ')
      .trim();
  }

  const mapaSuper24={};
  productosSuper24.forEach(([nombre,precio])=>{
    const clave=normalizarNombre(nombre);
    if(!(clave in mapaSuper24)) mapaSuper24[clave]=precio;
  });

  PRECIOS["Super 24"]={};
  base.forEach(({name})=>{
    PRECIOS["Super 24"][name]=mapaSuper24[normalizarNombre(name)] ?? 0;
  });
  PRECIOS["Cruz Verde"]=Object.fromEntries(base.map(({name})=>[name,0]));

  const escapeAttr=s=>String(s).replace(/\\/g,'\\\\').replace(/"/g,'\\"');
  const cartIndex=()=>new Map(state.cart.map(i=>[i.name,i]));
  const getItem=name=>base.find(i=>i.name===name);
  const getPrice=i=>PRECIOS[canal]?.[i.name]??i.price;

  function getFiltered(){
    const q=state.query.trim().toLowerCase();
    const list=q?base.filter(i=>i.name.toLowerCase().includes(q)):base;
    return list.map(i=>({...i,price:getPrice(i)}));
  }

  function getSubtotal(){
    return state.cart.reduce((a,i)=>a+getPrice({name:i.name,price:i.priceBase})*i.qty,0);
  }

  function renderList(){
    const items=getFiltered();
    const idx=cartIndex();
    ui.list.innerHTML=items.length?items.map(i=>{
      const q=idx.get(i.name)?.qty||0;
      const safe=escapeAttr(i.name);
      return `<div class="item" data-name="${safe}"><div class="left"><div class="row" style="gap:6px;align-items:center"><div class="truncate">${i.name}</div>${q?`<span class="chip" data-chip="${safe}">x${q}</span>`:""}</div><div class="muted">${Q(i.price)} · ${canal}</div></div><div class="row"><button type="button" data-add="${safe}">Agregar</button></div></div>`;
    }).join(""):'<div class="item"><div class="muted">No hay resultados…</div></div>';
  }

  function renderCart(){
    ui.cart.innerHTML=state.cart.length?state.cart.map(i=>{
      const p=getPrice({name:i.name,price:i.priceBase});
      const safe=escapeAttr(i.name);
      return `<div class="row cart-row"><div class="left"><div class="truncate">${i.name}</div><div class="muted">${i.qty} × ${Q(p)} = <b>${Q(i.qty*p)}</b></div></div><div class="mini-row"><button type="button" data-dec="${safe}">-</button><button type="button" data-inc="${safe}">+</button><button type="button" class="danger" data-remove="${safe}">Quitar</button></div></div>`;
    }).join(""):'<div class="muted">Aún no hay productos seleccionados.</div>';
  }

  function renderTotals(){
    const s=getSubtotal();
    ui.subtotal.textContent=Q(s);
    ui.aplicar.textContent=Q(s*motivo.factor);
    ui.motivoLabel.textContent=motivo.label;
    ui.motivoPct.textContent=Math.round(motivo.factor*100);
    ui.canalActualLabel.textContent=`${canal} · ${Math.round(motivo.factor*100)}%`;
    document.querySelectorAll('.canal-option').forEach(b=>b.classList.toggle('apply',b.dataset.canal===canal));
    document.querySelectorAll('.motivo-option').forEach(b=>b.classList.toggle('apply',b.dataset.motivo===motivo.key));
  }

  function syncListQty(name){
    const selectorSafe=CSS.escape(name);
    const row=ui.list.querySelector(`[data-name="${selectorSafe}"]`);
    if(!row) return;
    const head=row.querySelector('.left .row');
    if(!head) return;
    let chip=head.querySelector(`[data-chip="${selectorSafe}"]`);
    const q=state.cart.find(i=>i.name===name)?.qty||0;
    if(!q){ if(chip) chip.remove(); return; }
    if(!chip){
      chip=document.createElement('span');
      chip.className='chip';
      chip.dataset.chip=name;
      head.appendChild(chip);
    }
    chip.textContent=`x${q}`;
  }

  const renderAll=()=>{renderList();renderCart();renderTotals()};
  const renderFast=name=>{syncListQty(name);renderCart();renderTotals()};

  function add(name){
    const baseItem=getItem(name);
    if(!baseItem) return;
    const found=state.cart.find(i=>i.name===name);
    if(found) found.qty++;
    else state.cart.push({name,priceBase:baseItem.price,qty:1});
    renderFast(name);
  }

  function updateQty(name,delta){
    const found=state.cart.find(i=>i.name===name);
    if(!found) return;
    found.qty+=delta;
    if(found.qty<=0) state.cart=state.cart.filter(i=>i.name!==name);
    renderFast(name);
  }

  function removeItem(name){
    state.cart=state.cart.filter(i=>i.name!==name);
    renderFast(name);
  }

  function bind(){
    ui.search.addEventListener('input',e=>{state.query=e.target.value;renderList()});
    ui.btnClear.addEventListener('click',()=>{state.cart=[];renderAll()});
    ui.btnOpenCanal.addEventListener('click',()=>ui.canalModal.classList.remove('hidden'));
    ui.btnCloseCanal.addEventListener('click',()=>ui.canalModal.classList.add('hidden'));
    ui.canalModal.addEventListener('click',e=>e.target===ui.canalModal&&ui.canalModal.classList.add('hidden'));

    document.querySelectorAll('.canal-option').forEach(b=>b.addEventListener('click',()=>{
      canal=b.dataset.canal;
      renderAll();
    }));

    document.querySelectorAll('.motivo-option').forEach(b=>b.addEventListener('click',()=>{
      motivo=MOTIVOS[b.dataset.motivo]||MOTIVOS['50'];
      renderTotals();
      ui.canalModal.classList.add('hidden');
    }));

    ui.list.addEventListener('click',e=>{
      const b=e.target.closest('[data-add]');
      if(b) add(b.dataset.add);
    });

    ui.cart.addEventListener('click',e=>{
      const dec=e.target.closest('[data-dec]');
      const inc=e.target.closest('[data-inc]');
      const rem=e.target.closest('[data-remove]');
      if(dec) updateQty(dec.dataset.dec,-1);
      else if(inc) updateQty(inc.dataset.inc,1);
      else if(rem) removeItem(rem.dataset.remove);
    });
  }

  function runTests(){
    try{
      console.assert(Q(4.5)==='Q4.50','Q debe formatear a dos decimales');
      console.assert(escapeAttr('A\\B')==='A\\\\B','escapeAttr debe escapar backslash');
      console.assert(escapeAttr('A"B')==='A\\"B','escapeAttr debe escapar comillas');
      console.assert(getPrice({name:'Fresa',price:4.5})===4.5,'getPrice debe devolver precio base');
      canal='Super 24';
      console.assert(getPrice({name:'Fresa',price:4.5})===4.19,'Super 24 debe usar precio mapeado de Fresa');
      console.assert(getPrice({name:'Arco Iris',price:2.25})===2.09,'Super 24 debe mapear Arco Iris');
      console.assert(getPrice({name:'Chocobanano sin Maní Pequeño',price:4.5})===4.5,'Super 24 debe mapear sin mani');
      canal='Cruz Verde';
      console.assert(getPrice({name:'Fresa',price:4.5})===0,'Cruz Verde debe iniciar en 0');
      canal='Canal Detalle';
      state.cart=[{name:'Fresa',priceBase:4.5,qty:2},{name:'Cholapiz',priceBase:1.87,qty:1}];
      console.assert(Math.abs(getSubtotal()-10.87)<1e-9,'Subtotal debe ser correcto');
      state.query='mango';
      console.assert(getFiltered().some(i=>i.name.toLowerCase().includes('mango')),'Filtro mango debe encontrar resultados');
      state.query='';
      state.cart=[];
      console.debug('Tests OK');
    }catch(err){
      console.warn('Tests fallaron',err);
    }
  }

  document.addEventListener('DOMContentLoaded',()=>{
    document.addEventListener('touchend',e=>{
      const now=Date.now();
      if(now-lastTouchEnd<=300 && e.cancelable) e.preventDefault();
      lastTouchEnd=now;
    },{passive:false});

    Object.assign(ui,{
      list:$('list'),search:$('search'),cart:$('cart'),subtotal:$('subtotal'),aplicar:$('aplicar'),
      motivoLabel:$('motivoLabel'),motivoPct:$('motivoPct'),btnClear:$('btnClear'),btnOpenCanal:$('btnOpenCanal'),
      btnCloseCanal:$('btnCloseCanal'),canalModal:$('canalModal'),canalActualLabel:$('canalActualLabel')
    });

    bind();
    renderAll();
    runTests();

    if('serviceWorker' in navigator){
      addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
    }
  });
})();
</script>
</body>
</html>

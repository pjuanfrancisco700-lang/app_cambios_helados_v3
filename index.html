<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Cambios de Helados</title>
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.webmanifest">
  <style>
    :root{
      --bg:#efedf2;
      --surface:#f7f6f9;
      --card:#ffffff;
      --fg:#111111;
      --muted:#7d8290;
      --muted-2:#a3a8b5;
      --border:#e8e7ec;
      --chip:#f5f4f7;
      --chip-fg:#6f7482;
      --accent:#2f7b8b;
      --accent-press:#286b79;
      --danger:#ff3b30;
      --danger-soft:#ffe1de;
      --shadow:0 10px 30px rgba(18,18,23,.05);
      --radius:22px;
      --radius-sm:16px;
    }
    *{box-sizing:border-box}
    html,body{min-height:100%}
    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family:Inter,-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,Ubuntu,"Helvetica Neue",Arial,sans-serif;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }
    header{
      position:sticky;
      top:0;
      z-index:10;
      background:rgba(239,237,242,.88);
      backdrop-filter:saturate(180%) blur(12px);
      border-bottom:1px solid rgba(17,17,17,.05);
    }
    .wrap{
      max-width:760px;
      margin:0 auto;
      padding:18px 18px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .title{
      font-weight:800;
      font-size:18px;
      letter-spacing:-.03em;
    }
    .sub{
      font-size:12px;
      color:var(--muted);
      font-weight:500;
    }
    main{
      max-width:760px;
      margin:0 auto;
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }
    .card.pad{padding:18px}
    .row{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .row > .left{min-width:0}
    .chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:var(--chip);
      color:var(--chip-fg);
      border:1px solid var(--border);
      border-radius:999px;
      font-size:11px;
      font-weight:700;
      padding:5px 10px;
      min-width:34px;
    }
    input[type="text"]{
      width:100%;
      border:2px solid #d9dde5;
      background:#fff;
      border-radius:20px;
      padding:15px 16px;
      font-size:16px;
      font-weight:600;
      color:var(--fg);
      outline:none;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.75);
    }
    input[type="text"]::placeholder{color:#b2b7c2;font-weight:500}
    input[type="text"]:focus{
      border-color:#bcc5d2;
      box-shadow:0 0 0 4px rgba(47,123,139,.10);
    }
    button{
      background:#fff;
      border:1px solid var(--border);
      border-radius:18px;
      padding:11px 14px;
      font-size:15px;
      font-weight:700;
      color:var(--fg);
      box-shadow:0 1px 0 rgba(255,255,255,.8);
    }
    button:active{transform:scale(.985)}
    .list{
      max-height:420px;
      overflow:auto;
      border-top:1px solid transparent;
      padding:4px 0;
    }
    .item{
      padding:14px 16px;
      border-bottom:1px solid #f0eff4;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .item:last-child{border-bottom:0}
    .muted{color:var(--muted);font-size:12px;font-weight:500}
    .kpi{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .k{
      background:linear-gradient(180deg,#fff 0%, #fcfbfd 100%);
      border:1px solid var(--border);
      border-radius:18px;
      padding:14px;
    }
    .k .label{
      font-size:12px;
      color:var(--muted);
      font-weight:600;
      margin-bottom:4px;
    }
    .k .value{
      font-weight:800;
      letter-spacing:-.03em;
      font-size:17px;
    }
    .apply{
      background:var(--accent);
      color:#fff;
      border-color:var(--accent);
      box-shadow:none;
    }
    .apply:active{background:var(--accent-press)}
    .note{font-size:11px;color:#cfd7de;margin-top:4px}
    .danger{
      border-color:var(--danger-soft);
      color:var(--danger);
      background:#fff;
    }
    .hidden{display:none !important}
  </style>
</head>
<body>
<header>
  <div class="wrap">
    
    
  </div>
</header>

<main>
  <!-- Barra compacta -->
  <section class="card pad row">
    <div class="sub">Items: <b id="itemsCount">0</b></div>
    <div class="sub">Subtotal: <b id="subtotalText">Q0.00</b></div>
  </section>

  <!-- Canal y Motivo -->
  <section class="card pad">
    <div class="sub">Canal</div>
    <button id="btnOpenCanal" style="width:100%;margin-top:8px;display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-radius:20px;border:2px solid #d9dde5;background:#fff">
      <span id="canalActualLabel">Canal Detalle</span>
      <span class="muted" style="font-size:18px">▾</span>
    </button>
  </section>

  <!-- Sub ventana canal -->
  <div id="canalModal" class="hidden" style="position:fixed;inset:0;z-index:60;background:rgba(17,17,17,.28);padding:18px;display:flex;align-items:flex-end;justify-content:center">
    <div style="width:100%;max-width:760px;background:#fff;border:1px solid var(--border);border-radius:26px 26px 0 0;box-shadow:0 -12px 40px rgba(0,0,0,.12);padding:16px 16px 20px">
      <div style="width:48px;height:5px;border-radius:999px;background:#d7d9df;margin:2px auto 14px"></div>
      <div class="row" style="margin-bottom:10px">
        <div>
          <div class="title" style="font-size:18px">Seleccionar canal</div>
          <div class="sub">Toca una opción para cambiar precios.</div>
        </div>
        <button id="btnCloseCanal">Cerrar</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <button class="canal-option" data-canal="Canal Detalle" style="width:100%;text-align:left;padding:16px 18px">Canal Detalle</button>
        <button class="canal-option" data-canal="Super 24" style="width:100%;text-align:left;padding:16px 18px">Super 24</button>
        <button class="canal-option" data-canal="Cruz Verde" style="width:100%;text-align:left;padding:16px 18px">Cruz Verde</button>
      </div>
    </div>
  </div>
  <section class="card pad">
    <div class="sub">Motivo del cambio</div>
    <div class="row" style="gap:8px;margin-top:6px">
      <button data-motivo="50" class="apply motivo">Falta de energía eléctrica (50%)</button>
      <button data-motivo="100" class="motivo">Falla del congelador (100%)</button>
    </div>
  </section>

  <!-- Buscador -->
  <section class="card pad">
    <input id="search" type="text" placeholder="Buscar producto…">
  </section>

  <!-- Lista de productos -->
  <section class="card">
    <div id="list" class="list"></div>
  </section>

  <!-- Resumen -->
  <section class="card pad">
    <div class="row">
      <div class="title" style="font-size:14px">Resumen</div>
      <button id="btnClear">Limpiar</button>
    </div>
    <div id="cart" style="display:flex;flex-direction:column;gap:8px;margin-top:8px"></div>
    <div class="kpi" style="margin-top:8px">
      <div class="k">
        <div class="label">Subtotal</div>
        <div id="subtotal" class="value">Q0.00</div>
      </div>
      <div class="k">
        <div class="label">Motivo</div>
        <div id="motivoLabel" class="value">Falta de energía eléctrica (50%)</div>
      </div>
      <div class="k" style="grid-column:1/-1;background:#000;color:#fff">
        <div class="label" style="color:#d1d5db">Monto real a aplicar</div>
        <div id="aplicar" class="value" style="font-size:20px">Q0.00</div>
        <div class="note">Nota: se aplica el <span id="motivoPct">50</span>% sobre el subtotal.</div>
      </div>
    </div>
  </section>
</main>

<script>
// ===== Util =====
const Q = (n)=>`Q${Number(n||0).toFixed(2)}`;

// ===== Datos =====

// ===== PRECIOS POR CANAL =====
// Edita estos bloques cuando cambien los precios.
// Si un producto no aparece aquí, usa el precio base de la lista principal.
const PRECIOS_POR_CANAL = {
  "Canal Detalle": {
    // "Fresa": 4.5,
    // "Guanaba": 4.5,
  },
  "Super 24": {
    // "Fresa": 5.0,
    // "Guanaba": 5.0,
  },
  "Cruz Verde": {
    // "Fresa": 5.25,
    // "Guanaba": 5.25,
  }
};

const base = [
  {name:"Fresa",price:4.5},{name:"Guanaba",price:4.5},{name:"Mora",price:4.5},{name:"Jocote",price:4.5},
  {name:"Mango Verde con Pepitoria",price:4.5},{name:"Limón Dieta",price:6.3},{name:"Mandarina Dieta",price:6.3},
  {name:"Fresa Dieta",price:6.3},{name:"Mango Dieta",price:6.3},{name:"Yogurt de Fresa",price:6.3},
  {name:"Yogurt de Melocotón",price:6.3},{name:"Vainilla",price:4.5},{name:"Chocolate",price:4.5},
  {name:"Limón",price:4.5},{name:"Mandarina",price:4.5},{name:"Naranja con Pepitoria",price:4.5},
  {name:"Mango",price:4.5},{name:"Piña con Pepitoria",price:4.5},{name:"Tamarindo con Tajín",price:4.5},
  {name:"Nance",price:4.5},{name:"Paleta de Nutela",price:7.5},{name:"Paleta Morena",price:5.25},
  {name:"Paleta Chocolate Crispi",price:4.5},{name:"Paleta Chocolate Cream",price:3.75},
  {name:"Paleta de Mantequilla de Maní",price:7.5},{name:"Chocobanano con Maní Pequeño",price:5.25},
  {name:"Chocobanano sin Maní Pequeño",price:4.5},{name:"Cholapiz",price:1.87},{name:"Arco Iris",price:2.25},
  {name:"Twist Arcoiris",price:3.75},{name:"Twist Cotton Candy",price:3.75},{name:"Twist Gum (Chicle)",price:3.75},
  {name:"Mixta Barritas",price:0.0},{name:"Mixta Piñata",price:0.75},{name:"Cremosa Mandarina",price:3.0},
  {name:"Cremosa Uva",price:3.0},{name:"Cremosa Granadina",price:3.0},{name:"Cremosa Frambuesa",price:3.0},
  {name:"Cremosa Arandano",price:3.0},{name:"Twist Sipi Manzana Limon",price:3.75},{name:"Twist Sipi Punch Uva",price:3.75},
  {name:"Morena Cookies And Cream",price:6.0},{name:"Morena Con Cajeta",price:6.0},
];
let canal = "Canal Detalle";
let motivo = { key:"50", label:"Falta de energía eléctrica (50%)", factor:0.5 };

const state = {
  cart: [], // {name, priceBase, qty}
  query: ""
};

// ===== Render =====
const els = {
  list: document.getElementById("list"),
  search: document.getElementById("search"),
  cart: document.getElementById("cart"),
  subtotal: document.getElementById("subtotal"),
  subtotalText: document.getElementById("subtotalText"),
  aplicar: document.getElementById("aplicar"),
  motivoLabel: document.getElementById("motivoLabel"),
  motivoPct: document.getElementById("motivoPct"),
  itemsCount: document.getElementById("itemsCount"),
  btnClear: document.getElementById("btnClear"),
  btnOpenCanal: document.getElementById("btnOpenCanal"),
  btnCloseCanal: document.getElementById("btnCloseCanal"),
  canalModal: document.getElementById("canalModal"),
  canalActualLabel: document.getElementById("canalActualLabel"),
};

function getPrecio(item){
  return PRECIOS_POR_CANAL[canal]?.[item.name] ?? item.price;
}

function filteredData(){
  const q = state.query.trim().toLowerCase();
  const data = !q ? base : base.filter(x=>x.name.toLowerCase().includes(q));
  return data.map(item => ({ ...item, price: getPrecio(item) }));
}

function getQty(name){
  const it = state.cart.find(p=>p.name===name);
  return it? it.qty : 0;
}

function addItem(item, delta=1){
  const qty = Math.max(1, Number(delta)||1);
  const idx = state.cart.findIndex(p=>p.name===item.name);
  if(idx>=0){
    state.cart[idx].qty += qty;
  }else{
    state.cart.push({name:item.name, priceBase:item.price, qty});
  }
  render();
}

function updateQty(name, delta){
  const idx = state.cart.findIndex(p=>p.name===name);
  if(idx<0) return;
  state.cart[idx].qty = Math.max(0, state.cart[idx].qty + delta);
  if(state.cart[idx].qty===0) state.cart.splice(idx,1);
  render();
}

function removeItem(name){
  const i = state.cart.findIndex(p=>p.name===name);
  if(i>=0) state.cart.splice(i,1);
  render();
}

function renderList(){
  const data = filteredData();
  els.list.innerHTML = "";
  if(data.length===0){
    els.list.innerHTML = `<div class="item"><div class="muted">No hay resultados…</div></div>`;
    return;
  }
  for(const item of data){
    const row = document.createElement("div");
    row.className = "item";
    row.innerHTML = `
      <div class="left">
        <div class="row" style="gap:6px;align-items:center">
          <div style="font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:56vw">${item.name}</div>
          ${getQty(item.name)>0? `<span class="chip">x${getQty(item.name)}</span>`:``}
        </div>
        <div class="muted">${Q(item.price)} · ${canal}</div>
      </div>
      <div class="row" style="gap:8px">
        <button onclick='addItem(${JSON.stringify(item)})'>Agregar</button>
      </div>
    `;
    els.list.appendChild(row);
  }
}

function renderCart(){
  els.cart.innerHTML = "";
  if(state.cart.length===0){
    els.cart.innerHTML = `<div class="muted">Aún no hay productos seleccionados.</div>`;
    return;
  }
  for(const it of state.cart){
    const precioActual = getPrecio({ name: it.name, price: it.priceBase });
    const row = document.createElement("div");
    row.className = "row";
    row.style = "justify-content:space-between;gap:8px;align-items:center;border:1px solid var(--border);border-radius:12px;padding:8px;background:#fff";
    row.innerHTML = `
      <div class="left" style="min-width:0">
        <div style="font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:56vw">${it.name}</div>
        <div class="muted">${it.qty} × ${Q(precioActual)} = <b>${Q(it.qty*precioActual)}</b></div>
      </div>
      <div class="row" style="gap:6px">
        <button onclick='updateQty(${JSON.stringify(it.name)}, -1)'>-</button>
        <button onclick='updateQty(${JSON.stringify(it.name)}, +1)'>+</button>
        <button class="danger" onclick='removeItem(${JSON.stringify(it.name)})'>Quitar</button>
      </div>
    `;
    els.cart.appendChild(row);
  }
}

function renderTotals(){
  const subtotal = state.cart.reduce((a,it)=>a+getPrecio({ name: it.name, price: it.priceBase })*it.qty,0);
  const aplicar = subtotal * (motivo.factor||1);
  els.subtotal.textContent = Q(subtotal);
  els.subtotalText.textContent = Q(subtotal);
  els.aplicar.textContent = Q(aplicar);
  els.itemsCount.textContent = state.cart.reduce((a,p)=>a+p.qty,0);
  els.motivoLabel.textContent = motivo.label;
  els.motivoPct.textContent = Math.round((motivo.factor||0)*100);
  els.canalActualLabel.textContent = canal;
  document.querySelectorAll('.canal-option').forEach(btn=>{
    btn.classList.toggle('apply', btn.dataset.canal === canal);
  });
}

function render(){
  renderList();
  renderCart();
  renderTotals();
}

// ===== Eventos =====
els.search.addEventListener("input", (e)=>{ state.query = e.target.value; renderList(); });
els.btnClear.addEventListener("click", ()=>{ state.cart = []; render(); });

document.querySelectorAll(".motivo").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll(".motivo").forEach(b=>b.classList.remove("apply"));
    btn.classList.add("apply");
    if(btn.dataset.motivo==="50"){
      motivo = { key:"50", label:"Falta de energía eléctrica (50%)", factor:0.5 };
    }else{
      motivo = { key:"100", label:"Falla del congelador (100%)", factor:1.0 };
    }
    renderTotals();
  });
});

els.btnOpenCanal.addEventListener("click", ()=>{
  els.canalModal.classList.remove("hidden");
});

els.btnCloseCanal.addEventListener("click", ()=>{
  els.canalModal.classList.add("hidden");
});

els.canalModal.addEventListener("click", (e)=>{
  if(e.target === els.canalModal){
    els.canalModal.classList.add("hidden");
  }
});

document.querySelectorAll(".canal-option").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    canal = btn.dataset.canal;
    els.canalModal.classList.add("hidden");
    render();
  });
});

// ===== Tests ligeros en runtime (no modificar los existentes) =====
(function runLightTests(){
  try{
    console.assert(Q(0)==="Q0.00","Q(0) debe formatear Q0.00");
    console.assert(Q(4.5)==="Q4.50","Q(4.5) debe formatear Q4.50");
    const demoSub = 3*4.5 + 2*6.3; // 26.1
    console.assert(Math.abs(demoSub-26.1)<1e-9,"Subtotal demo incorrecto");
    console.assert(Math.abs(demoSub*0.5-13.05)<1e-9,"Monto 50% incorrecto");
    console.assert(Math.abs(demoSub*1.0-26.1)<1e-9,"Monto 100% incorrecto");
    // Adicionales
    console.assert(Q(null)==="Q0.00","Q(null) debe formatear Q0.00");
    const mock = [{price:2,qty:2},{price:3,qty:1}];
    const msub = mock.reduce((a,x)=>a+x.price*x.qty,0);
    console.assert(msub===7,"Subtotal mock debe ser 7");
    console.debug("Tests ligeros OK");
  }catch(e){ console.warn("Tests ligeros fallaron:",e); }
})();

// Init + SW
render();
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>navigator.serviceWorker.register("./sw.js"));
}
</script>
</body>
</html>

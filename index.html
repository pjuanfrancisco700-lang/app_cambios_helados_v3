<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Cambios de Helados</title>
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.webmanifest">
  <style>
    :root{
      --bg:#efedf2;
      --surface:#f7f6f9;
      --card:#ffffff;
      --fg:#111111;
      --muted:#7d8290;
      --muted-2:#a3a8b5;
      --border:#e8e7ec;
      --chip:#f5f4f7;
      --chip-fg:#6f7482;
      --accent:#2f7b8b;
      --accent-press:#286b79;
      --danger:#ff3b30;
      --danger-soft:#ffe1de;
      --shadow:0 10px 30px rgba(18,18,23,.05);
      --radius:22px;
      --radius-sm:16px;
    }
    *{box-sizing:border-box}
    html{-webkit-text-size-adjust:100%;touch-action:manipulation}
    body{touch-action:manipulation}
    html,body{min-height:100%}
    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family:Inter,-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,Ubuntu,"Helvetica Neue",Arial,sans-serif;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }
    header{
      position:sticky;
      top:0;
      z-index:10;
      background:rgba(239,237,242,.88);
      backdrop-filter:saturate(180%) blur(12px);
      border-bottom:1px solid rgba(17,17,17,.05);
    }
    .wrap{
      max-width:760px;
      margin:0 auto;
      padding:18px 18px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      min-height:20px;
    }
    .title{
      font-weight:800;
      font-size:18px;
      letter-spacing:-.03em;
    }
    .sub{
      font-size:12px;
      color:var(--muted);
      font-weight:500;
    }
    main{
      max-width:760px;
      margin:0 auto;
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }
    .card.pad{padding:18px}
    .row{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .row>.left{min-width:0}
    .chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:var(--chip);
      color:var(--chip-fg);
      border:1px solid var(--border);
      border-radius:999px;
      font-size:11px;
      font-weight:700;
      padding:5px 10px;
      min-width:34px;
    }
    input[type="text"]{
      width:100%;
      border:2px solid #d9dde5;
      background:#fff;
      border-radius:20px;
      padding:15px 16px;
      font-size:16px;
      font-weight:600;
      color:var(--fg);
      outline:none;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.75);
    }
    input[type="text"]::placeholder{color:#b2b7c2;font-weight:500}
    input[type="text"]:focus{
      border-color:#bcc5d2;
      box-shadow:0 0 0 4px rgba(47,123,139,.10);
    }
    button{
      background:#fff;
      border:1px solid var(--border);
      border-radius:18px;
      padding:11px 14px;
      font-size:15px;
      font-weight:700;
      color:var(--fg);
      box-shadow:0 1px 0 rgba(255,255,255,.8);
      cursor:pointer;
    }
    button:active{transform:scale(.985)}
    .list{
      height:min(52svh,460px);
      overflow-y:auto;
      overflow-x:hidden;
      overscroll-behavior:contain;
      -webkit-overflow-scrolling:touch;
      border-top:1px solid transparent;
      padding:4px 0;
    }
    .item{
      padding:14px 16px;
      border-bottom:1px solid #f0eff4;
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      align-items:center;
      gap:10px;
    }
    .item:last-child{border-bottom:0}
    .item .left{min-width:0}
    .item button{flex-shrink:0;white-space:nowrap}
    @media (max-width:640px){
      .item{
        grid-template-columns:minmax(0,1fr);
        align-items:flex-start;
      }
      .item>.row{
        width:100%;
        justify-content:flex-end;
      }
    }
    .muted{color:var(--muted);font-size:12px;font-weight:500}
    .kpi{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .k{
      background:linear-gradient(180deg,#fff 0%,#fcfbfd 100%);
      border:1px solid var(--border);
      border-radius:18px;
      padding:14px;
    }
    .k .label{
      font-size:12px;
      color:var(--muted);
      font-weight:600;
      margin-bottom:4px;
    }
    .k .value{
      font-weight:800;
      letter-spacing:-.03em;
      font-size:17px;
    }
    .apply{
      background:var(--accent);
      color:#fff;
      border-color:var(--accent);
      box-shadow:none;
    }
    .apply:active{background:var(--accent-press)}
    .note{font-size:11px;color:#cfd7de;margin-top:4px}
    .danger{
      border-color:var(--danger-soft);
      color:var(--danger);
      background:#fff;
    }
    .hidden{display:none !important}
  </style>
</head>
<body>
<header>
  <div class="wrap"></div>
</header>

<main>
  <section class="card pad">
    <div class="sub">Canal</div>
    <button id="btnOpenCanal" type="button" style="width:100%;margin-top:8px;display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-radius:20px;border:2px solid #d9dde5;background:#fff">
      <span id="canalActualLabel">Canal Detalle</span>
      <span class="muted" style="font-size:18px">▾</span>
    </button>
  </section>

  <div id="canalModal" class="hidden" style="position:fixed;inset:0;z-index:60;background:rgba(17,17,17,.28);padding:18px;display:flex;align-items:flex-end;justify-content:center">
    <div style="width:100%;max-width:760px;background:#fff;border:1px solid var(--border);border-radius:26px 26px 0 0;box-shadow:0 -12px 40px rgba(0,0,0,.12);padding:16px 16px 20px">
      <div style="width:48px;height:5px;border-radius:999px;background:#d7d9df;margin:2px auto 14px"></div>
      <div class="row" style="margin-bottom:10px">
        <div>
          <div class="title" style="font-size:18px">Canal y motivo</div>
          <div class="sub">Selecciona ambos dentro de esta misma ventana.</div>
        </div>
        <button id="btnCloseCanal" type="button">Cerrar</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <div class="sub" style="margin-top:2px">Canal</div>
        <button class="canal-option" data-canal="Canal Detalle" type="button" style="width:100%;text-align:left;padding:16px 18px">Canal Detalle</button>
        <button class="canal-option" data-canal="Super 24" type="button" style="width:100%;text-align:left;padding:16px 18px">Super 24</button>
        <button class="canal-option" data-canal="Cruz Verde" type="button" style="width:100%;text-align:left;padding:16px 18px">Cruz Verde</button>
      </div>
      <div style="height:1px;background:#f0eff4;margin:14px 0"></div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <div class="sub">Motivo del cambio</div>
        <button data-motivo="50" class="motivo-option" type="button" style="width:100%;text-align:left;padding:16px 18px">Falta de energía eléctrica (50%)</button>
        <button data-motivo="100" class="motivo-option" type="button" style="width:100%;text-align:left;padding:16px 18px">Falla del congelador (100%)</button>
      </div>
    </div>
  </div>

  

  <section class="card pad">
    <input id="search" type="text" placeholder="Buscar producto…">
  </section>

  <section class="card">
    <div id="list" class="list"></div>
  </section>

  <section class="card pad">
    <div class="row">
      <div class="title" style="font-size:14px">Resumen</div>
      <button id="btnClear" type="button">Limpiar</button>
    </div>
    <div id="cart" style="display:flex;flex-direction:column;gap:8px;margin-top:8px"></div>
    <div class="kpi" style="margin-top:8px">
      <div class="k">
        <div class="label">Subtotal</div>
        <div id="subtotal" class="value">Q0.00</div>
      </div>
      <div class="k">
        <div class="label">Motivo</div>
        <div id="motivoLabel" class="value">Falta de energía eléctrica (50%)</div>
      </div>
      <div class="k" style="grid-column:1/-1;background:#000;color:#fff">
        <div class="label" style="color:#d1d5db">Monto real a aplicar</div>
        <div id="aplicar" class="value" style="font-size:20px">Q0.00</div>
        <div class="note">Nota: se aplica el <span id="motivoPct">50</span>% sobre el subtotal.</div>
      </div>
    </div>
  </section>
</main>

<script>
(function(){
  let lastTouchEnd = 0;
  let ui = null;

  const Q = (n) => `Q${Number(n || 0).toFixed(2)}`;

  const PRECIOS_POR_CANAL = {
    "Canal Detalle": {},
    "Super 24": {},
    "Cruz Verde": {}
  };

  const base = [
    {name:"Fresa",price:4.5},{name:"Guanaba",price:4.5},{name:"Mora",price:4.5},{name:"Jocote",price:4.5},
    {name:"Mango Verde con Pepitoria",price:4.5},{name:"Limón Dieta",price:6.3},{name:"Mandarina Dieta",price:6.3},
    {name:"Fresa Dieta",price:6.3},{name:"Mango Dieta",price:6.3},{name:"Yogurt de Fresa",price:6.3},
    {name:"Yogurt de Melocotón",price:6.3},{name:"Vainilla",price:4.5},{name:"Chocolate",price:4.5},
    {name:"Limón",price:4.5},{name:"Mandarina",price:4.5},{name:"Naranja con Pepitoria",price:4.5},
    {name:"Mango",price:4.5},{name:"Piña con Pepitoria",price:4.5},{name:"Tamarindo con Tajín",price:4.5},
    {name:"Nance",price:4.5},{name:"Paleta de Nutela",price:7.5},{name:"Paleta Morena",price:5.25},
    {name:"Paleta Chocolate Crispi",price:4.5},{name:"Paleta Chocolate Cream",price:3.75},
    {name:"Paleta de Mantequilla de Maní",price:7.5},{name:"Chocobanano con Maní Pequeño",price:5.25},
    {name:"Chocobanano sin Maní Pequeño",price:4.5},{name:"Cholapiz",price:1.87},{name:"Arco Iris",price:2.25},
    {name:"Twist Arcoiris",price:3.75},{name:"Twist Cotton Candy",price:3.75},{name:"Twist Gum (Chicle)",price:3.75},
    {name:"Mixta Barritas",price:0.0},{name:"Mixta Piñata",price:0.75},{name:"Cremosa Mandarina",price:3.0},
    {name:"Cremosa Uva",price:3.0},{name:"Cremosa Granadina",price:3.0},{name:"Cremosa Frambuesa",price:3.0},
    {name:"Cremosa Arandano",price:3.0},{name:"Twist Sipi Manzana Limon",price:3.75},{name:"Twist Sipi Punch Uva",price:3.75},
    {name:"Morena Cookies And Cream",price:6.0},{name:"Morena Con Cajeta",price:6.0}
  ];

  let canal = "Canal Detalle";
  let motivo = { key:"50", label:"Falta de energía eléctrica (50%)", factor:0.5 };

  const state = {
    cart: [],
    query: ""
  };

  function getPrecio(item){
    return PRECIOS_POR_CANAL[canal]?.[item.name] ?? item.price;
  }

  function getSubtotal(){
    return state.cart.reduce((a, it) => a + getPrecio({ name: it.name, price: it.priceBase }) * it.qty, 0);
  }

  function filteredData(){
    const q = state.query.trim().toLowerCase();
    const data = !q ? base : base.filter((x) => x.name.toLowerCase().includes(q));
    return data.map((item) => ({ ...item, price: getPrecio(item) }));
  }

  function getQty(name){
    const it = state.cart.find((p) => p.name === name);
    return it ? it.qty : 0;
  }

  function renderList(){
    if(!ui?.list) return;
    const data = filteredData();
    ui.list.innerHTML = "";
    if(data.length === 0){
      ui.list.innerHTML = '<div class="item"><div class="muted">No hay resultados…</div></div>';
      return;
    }
    for(const item of data){
      const row = document.createElement("div");
      row.className = "item";
      row.innerHTML = `
        <div class="left">
          <div class="row" style="gap:6px;align-items:center">
            <div style="font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:56vw">${item.name}</div>
            ${getQty(item.name) > 0 ? `<span class="chip">x${getQty(item.name)}</span>` : ``}
          </div>
          <div class="muted">${Q(item.price)} · ${canal}</div>
        </div>
        <div class="row" style="gap:8px">
          <button type="button" data-add="${item.name}">Agregar</button>
        </div>
      `;
      ui.list.appendChild(row);
    }
  }

  function renderCart(){
    if(!ui?.cart) return;
    ui.cart.innerHTML = "";
    if(state.cart.length === 0){
      ui.cart.innerHTML = '<div class="muted">Aún no hay productos seleccionados.</div>';
      return;
    }
    for(const it of state.cart){
      const precioActual = getPrecio({ name: it.name, price: it.priceBase });
      const row = document.createElement("div");
      row.className = "row";
      row.style.cssText = "justify-content:space-between;gap:8px;align-items:center;border:1px solid var(--border);border-radius:12px;padding:8px;background:#fff";
      row.innerHTML = `
        <div class="left" style="min-width:0">
          <div style="font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:56vw">${it.name}</div>
          <div class="muted">${it.qty} × ${Q(precioActual)} = <b>${Q(it.qty * precioActual)}</b></div>
        </div>
        <div class="row" style="gap:6px">
          <button type="button" data-dec="${it.name}">-</button>
          <button type="button" data-inc="${it.name}">+</button>
          <button type="button" class="danger" data-remove="${it.name}">Quitar</button>
        </div>
      `;
      ui.cart.appendChild(row);
    }
  }

  function renderTotals(){
    const subtotal = getSubtotal();
    const aplicar = subtotal * (motivo.factor || 1);
    if(ui?.subtotal) ui.subtotal.textContent = Q(subtotal);
    if(ui?.aplicar) ui.aplicar.textContent = Q(aplicar);
    if(ui?.motivoLabel) ui.motivoLabel.textContent = motivo.label;
    if(ui?.motivoPct) ui.motivoPct.textContent = String(Math.round((motivo.factor || 0) * 100));
    if(ui?.canalActualLabel) ui.canalActualLabel.textContent = `${canal} · ${Math.round((motivo.factor || 0) * 100)}%`;
    document.querySelectorAll('.canal-option').forEach((btn) => {
      btn.classList.toggle('apply', btn.dataset.canal === canal);
    });
    document.querySelectorAll('.motivo-option').forEach((btn) => {
      btn.classList.toggle('apply', btn.dataset.motivo === motivo.key);
    });
  }

  function render(){
    if(!ui) return;
    renderList();
    renderCart();
    renderTotals();
  }

  function addItem(item, delta = 1){
    const qty = Math.max(1, Number(delta) || 1);
    const idx = state.cart.findIndex((p) => p.name === item.name);
    if(idx >= 0){
      state.cart[idx].qty += qty;
    }else{
      state.cart.push({ name: item.name, priceBase: item.price, qty });
    }
    render();
  }

  function updateQty(name, delta){
    const idx = state.cart.findIndex((p) => p.name === name);
    if(idx < 0) return;
    state.cart[idx].qty = Math.max(0, state.cart[idx].qty + delta);
    if(state.cart[idx].qty === 0) state.cart.splice(idx, 1);
    render();
  }

  function removeItem(name){
    const i = state.cart.findIndex((p) => p.name === name);
    if(i >= 0) state.cart.splice(i, 1);
    render();
  }

  function getBaseItemByName(name){
    return base.find((item) => item.name === name) || null;
  }

  function requiredElementsPresent(){
    return Boolean(
      ui?.list && ui?.search && ui?.cart && ui?.subtotal && ui?.aplicar &&
      ui?.motivoLabel && ui?.motivoPct && ui?.btnClear && ui?.btnOpenCanal &&
      ui?.btnCloseCanal && ui?.canalModal && ui?.canalActualLabel
    );
  }

  function bindEvents(){
    ui.search.addEventListener("input", (e) => {
      state.query = e.target.value;
      renderList();
    });

    ui.btnClear.addEventListener("click", () => {
      state.cart = [];
      render();
    });

        document.querySelectorAll(".motivo-option").forEach((btn) => {
      btn.addEventListener("click", () => {
        motivo = btn.dataset.motivo === "50"
          ? { key:"50", label:"Falta de energía eléctrica (50%)", factor:0.5 }
          : { key:"100", label:"Falla del congelador (100%)", factor:1.0 };
        renderTotals();
      });
    });

    ui.btnOpenCanal.addEventListener("click", () => {
      ui.canalModal.classList.remove("hidden");
    });

    ui.btnCloseCanal.addEventListener("click", () => {
      ui.canalModal.classList.add("hidden");
    });

    ui.canalModal.addEventListener("click", (e) => {
      if(e.target === ui.canalModal){
        ui.canalModal.classList.add("hidden");
      }
    });

    document.querySelectorAll(".canal-option").forEach((btn) => {
      btn.addEventListener("click", () => {
        canal = btn.dataset.canal;
        ui.canalModal.classList.add("hidden");
        render();
      });
    });

    ui.list.addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-add]");
      if(!btn) return;
      const item = getBaseItemByName(btn.dataset.add);
      if(item) addItem(item, 1);
    });

    ui.cart.addEventListener("click", (e) => {
      const decBtn = e.target.closest("button[data-dec]");
      if(decBtn){
        updateQty(decBtn.dataset.dec, -1);
        return;
      }
      const incBtn = e.target.closest("button[data-inc]");
      if(incBtn){
        updateQty(incBtn.dataset.inc, 1);
        return;
      }
      const removeBtn = e.target.closest("button[data-remove]");
      if(removeBtn){
        removeItem(removeBtn.dataset.remove);
      }
    });
  }

  function runLightTests(){
    try{
      console.assert(Q(0) === "Q0.00", "Q(0) debe formatear Q0.00");
      console.assert(Q(4.5) === "Q4.50", "Q(4.5) debe formatear Q4.50");
      console.assert(Q(null) === "Q0.00", "Q(null) debe formatear Q0.00");
      console.assert(Q("7.1") === "Q7.10", "Q('7.1') debe formatear Q7.10");

      const demoSub = 3 * 4.5 + 2 * 6.3;
      console.assert(Math.abs(demoSub - 26.1) < 1e-9, "Subtotal demo incorrecto");
      console.assert(Math.abs(demoSub * 0.5 - 13.05) < 1e-9, "Monto 50% incorrecto");
      console.assert(Math.abs(demoSub * 1.0 - 26.1) < 1e-9, "Monto 100% incorrecto");

      const mock = [{price:2,qty:2},{price:3,qty:1}];
      const msub = mock.reduce((a,x) => a + x.price * x.qty, 0);
      console.assert(msub === 7, "Subtotal mock debe ser 7");

      state.cart = [];
      addItem({ name:"Fresa", price:4.5 }, 2);
      console.assert(getQty("Fresa") === 2, "Debe agregar 2 Fresa");
      updateQty("Fresa", -1);
      console.assert(getQty("Fresa") === 1, "Debe disminuir 1 Fresa");
      removeItem("Fresa");
      console.assert(getQty("Fresa") === 0, "Debe quitar Fresa del carrito");

      state.query = "mango";
      console.assert(filteredData().some((x) => x.name.toLowerCase().includes("mango")), "El filtro debe devolver productos con mango");
      state.query = "xyz-no-existe";
      console.assert(filteredData().length === 0, "Un filtro inexistente debe devolver 0 resultados");
      state.query = "";

      canal = "Canal Detalle";
      console.assert(getPrecio({ name:"Fresa", price:4.5 }) === 4.5, "Precio base debe mantenerse cuando no hay override");
      console.assert(requiredElementsPresent() === true, "Los elementos del DOM requeridos deben existir");
      motivo = { key:"50", label:"Falta de energía eléctrica (50%)", factor:0.5 };
      renderTotals();
      console.assert(ui.canalActualLabel.textContent.includes("Canal Detalle"), "La cabecera debe mostrar el canal actual");

      state.cart = [];
      motivo = { key:"100", label:"Falla del congelador (100%)", factor:1 };
      addItem({ name:"Cholapiz", price:1.87 }, 2);
      console.assert(Math.abs(getSubtotal() - 3.74) < 1e-9, "Subtotal con Cholapiz debe ser 3.74");
      state.cart = [];
      motivo = { key:"50", label:"Falta de energía eléctrica (50%)", factor:0.5 };

      console.debug("Tests ligeros OK");
    }catch(e){
      console.warn("Tests ligeros fallaron:", e);
    }
  }

  document.addEventListener("DOMContentLoaded", () => {
    document.addEventListener("touchend", (e) => {
      const now = Date.now();
      if(now - lastTouchEnd <= 300){
        e.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive:false });

    ui = {
      list: document.getElementById("list"),
      search: document.getElementById("search"),
      cart: document.getElementById("cart"),
      subtotal: document.getElementById("subtotal"),
      aplicar: document.getElementById("aplicar"),
      motivoLabel: document.getElementById("motivoLabel"),
      motivoPct: document.getElementById("motivoPct"),
      btnClear: document.getElementById("btnClear"),
      btnOpenCanal: document.getElementById("btnOpenCanal"),
      btnCloseCanal: document.getElementById("btnCloseCanal"),
      canalModal: document.getElementById("canalModal"),
      canalActualLabel: document.getElementById("canalActualLabel")
    };

    if(!requiredElementsPresent()){
      console.error("Faltan elementos del DOM requeridos para iniciar la app.");
      return;
    }

    bindEvents();
    render();
    runLightTests();

    if("serviceWorker" in navigator){
      window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js"));
    }
  });
})();
</script>
</body>
</html>
